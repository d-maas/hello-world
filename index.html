<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0d1b2a">
  <title>GDP Guardian</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
    }
    body {
      position: fixed;           /* stop iOS rubber-band scroll */
      width: 100%;
      height: 100vh;
      height: 100dvh;            /* dynamic viewport — excludes browser chrome */
      background: #0d1b2a;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
    }
    canvas {
      display: block;
      border: 2px solid #3a86ff;
      border-radius: 8px;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      cursor: pointer;
    }
    /* Portrait-mode overlay — shown by JS */
    #rotate {
      display: none;
      position: fixed;
      inset: 0;
      background: #0d1b2a;
      color: #fff;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99;
      text-align: center;
      padding: 24px;
      gap: 20px;
    }
    #rotate svg { animation: spin 2s linear infinite; }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    #rotate p { font-size: clamp(14px, 4vw, 22px); line-height: 1.5;
                color: rgba(255,255,255,0.85); }
    #rotate strong { color: #f1c40f; font-size: 1.1em; }
  </style>
</head>
<body>
<!-- Shown only in portrait on touch devices -->
<div id="rotate">
  <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#3a86ff" stroke-width="1.5">
    <rect x="4" y="2" width="16" height="20" rx="2"/>
    <circle cx="12" cy="17" r="1"/>
    <path d="M8 2h8" stroke-linecap="round"/>
  </svg>
  <p><strong>Please rotate your device</strong><br>This game is best played in landscape mode.</p>
</div>
<canvas id="game"></canvas>
<script>
// ─── GDP GUARDIAN ─── Good Distribution Practices Training Game ───────────────
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
const W = 800, H = 530;
canvas.width = W; canvas.height = H;

// ─── Touch detection (cached once) ───────────────────────────────────────────
const hasTouchScreen = navigator.maxTouchPoints > 0 || 'ontouchstart' in window;

// ─── Fit canvas + portrait guard ─────────────────────────────────────────────
const rotateEl = document.getElementById('rotate');

function fitCanvas() {
  // visualViewport gives the true visible area on iOS (excludes safari chrome)
  const vw = (window.visualViewport || window).width  || window.innerWidth;
  const vh = (window.visualViewport || window).height || window.innerHeight;
  const s  = Math.min(vw / W, vh / H);   // no cap — fill the screen on tablets/phones
  canvas.style.width  = Math.round(W * s) + 'px';
  canvas.style.height = Math.round(H * s) + 'px';

  // Show rotate prompt only on touch devices in portrait
  if (rotateEl) rotateEl.style.display =
    (hasTouchScreen && window.innerWidth < window.innerHeight) ? 'flex' : 'none';
}

window.addEventListener('resize', fitCanvas);
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', fitCanvas);
}
fitCanvas();

// ─── Constants ────────────────────────────────────────────────────────────────
const GRAVITY    = 0.55;
const JUMP_FORCE = -12;
const MOVE_SPEED = 4;
const GY         = 465; // ground surface Y

// ─── Input ────────────────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup',   e => { keys[e.code] = false; });

const touch = { left: false, right: false, jump: false };

// ─── State ────────────────────────────────────────────────────────────────────
let state   = 'title';   // title | playing | levelComplete | gameOver | win
let lvIdx   = 0;
let lives   = 3;
let score   = 0;
let collected = 0;
let needed    = 0;
let frame     = 0;
let msgTimer  = 0;   // countdown after level/game over screen shown
let msgText   = '';

// ─── Player ───────────────────────────────────────────────────────────────────
const P = { x:0, y:0, vx:0, vy:0, w:22, h:36, onGround:false, inv:0, right:true };

function resetPlayer(sx, sy) {
  P.x = sx; P.y = sy; P.vx = 0; P.vy = 0; P.onGround = false; P.inv = 0;
}

// ─── Levels ───────────────────────────────────────────────────────────────────
function mkItem(type, x, y) {
  const good = !['expired','wrong_temp','damaged','temp_exc','unsigned'].includes(type);
  return { type, x, y, collected: false, good };
}

const LEVELS = [
  {
    name: 'Level 1: The Warehouse',
    hint: 'Collect temperature logs & properly labelled boxes. Avoid GDP violations!',
    bgColor: ['#101c2c','#1a2d3f'],
    fgColor: '#7a5a3a',
    platforms: [
      { x:0,   y:GY,  w:W,   h:65 },   // ground
      { x:100, y:420, w:120, h:14 },
      { x:280, y:360, w:120, h:14 },
      { x:460, y:300, w:120, h:14 },
      { x:600, y:240, w:150, h:14 },
      { x:350, y:188, w:160, h:14 },
      { x:80,  y:138, w:160, h:14 },
      { x:550, y:98,  w:200, h:14 },
    ],
    items: [
      // collectibles
      mkItem('temp_log', 130, 396),
      mkItem('temp_log',  50, 441),
      mkItem('temp_log', 300, 336),
      mkItem('label',    480, 276),
      mkItem('temp_log', 640, 216),
      mkItem('label',    390, 164),
      mkItem('label',    100, 114),
      mkItem('temp_log', 580,  74),
      // hazards
      mkItem('expired',    200, 441),
      mkItem('wrong_temp', 360, 441),
      mkItem('expired',    520, 441),
      mkItem('wrong_temp', 680, 441),
      mkItem('expired',    510, 276),
      mkItem('wrong_temp', 460, 164),
    ],
    needed: 8,
    start: { x:40, y:425 },
    exit:  { x:715, y:43, w:55, h:55 },
    tip: {
      title: 'GDP: Temperature Control & Storage',
      lines: [
        'Always record and monitor storage temperatures.',
        'Follow FEFO — First Expired, First Out.',
        'Never mix expired stock with compliant goods.',
        'Store every product within its labelled temperature range.',
      ],
    },
  },
  {
    name: 'Level 2: The Distribution Route',
    hint: 'Collect delivery notes & cold packs. Report damages and temp excursions!',
    bgColor: ['#0e1e0e','#162614'],
    fgColor: '#3a6a3a',
    platforms: [
      { x:0,   y:GY,  w:W,   h:65 },
      { x:80,  y:415, w:130, h:14 },
      { x:270, y:355, w:130, h:14 },
      { x:460, y:295, w:130, h:14 },
      { x:620, y:235, w:150, h:14 },
      { x:380, y:183, w:160, h:14 },
      { x:100, y:138, w:150, h:14 },
      { x:550, y:103, w:200, h:14 },
    ],
    items: [
      // collectibles
      mkItem('delivery', 110, 391),
      mkItem('cold_pack',  50, 441),
      mkItem('delivery',  290, 331),
      mkItem('cold_pack', 480, 271),
      mkItem('delivery',  645, 211),
      mkItem('delivery',  410, 159),
      mkItem('cold_pack', 120, 114),
      mkItem('delivery',  570,  79),
      mkItem('cold_pack', 680,  79),
      // hazards
      mkItem('damaged',    190, 441),
      mkItem('temp_exc',   360, 441),
      mkItem('unsigned',   530, 441),
      mkItem('damaged',    670, 441),
      mkItem('damaged',    510, 271),
      mkItem('temp_exc',   490, 159),
    ],
    needed: 9,
    start: { x:40, y:425 },
    exit:  { x:715, y:48, w:55, h:55 },
    tip: {
      title: 'GDP: Cold Chain & Documentation',
      lines: [
        'Maintain an unbroken cold chain throughout distribution.',
        'All deliveries require complete, signed documentation.',
        'Inspect every package for damage before accepting.',
        'Quarantine and report any temperature excursions immediately.',
      ],
    },
  },
];

// ─── Load level ───────────────────────────────────────────────────────────────
function loadLevel(i) {
  lvIdx = i;
  const lv = LEVELS[i];
  lv.items.forEach(it => { it.collected = false; });
  collected = 0;
  needed    = lv.needed;
  resetPlayer(lv.start.x, lv.start.y);
  state = 'playing';
}

function startGame() {
  lives = 3; score = 0;
  loadLevel(0);
}

// ─── Collision ────────────────────────────────────────────────────────────────
function overlap(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

function resolvePlatforms(plats) {
  P.onGround = false;
  for (const pl of plats) {
    if (!overlap(P.x,P.y,P.w,P.h, pl.x,pl.y,pl.w,pl.h)) continue;
    const oL = (P.x+P.w) - pl.x;
    const oR = (pl.x+pl.w) - P.x;
    const oT = (P.y+P.h) - pl.y;
    const oB = (pl.y+pl.h) - P.y;
    const m  = Math.min(oL,oR,oT,oB);
    if (m === oT && P.vy >= 0) { P.y = pl.y - P.h; P.vy = 0; P.onGround = true; }
    else if (m === oB && P.vy < 0) { P.y = pl.y + pl.h; P.vy = 0; }
    else if (m === oL) { P.x = pl.x - P.w; P.vx = 0; }
    else if (m === oR) { P.x = pl.x + pl.w; P.vx = 0; }
  }
}

// ─── Update ───────────────────────────────────────────────────────────────────
function update() {
  frame++;
  if (state !== 'playing') return;

  const lv = LEVELS[lvIdx];
  const left  = keys['ArrowLeft']  || keys['KeyA'] || touch.left;
  const right = keys['ArrowRight'] || keys['KeyD'] || touch.right;
  const jump  = keys['ArrowUp']    || keys['KeyW'] || keys['Space'] || touch.jump;

  if (left)  { P.vx = -MOVE_SPEED; P.right = false; }
  if (right) { P.vx =  MOVE_SPEED; P.right = true;  }
  if (!left && !right) P.vx *= 0.75;

  if (jump && P.onGround) P.vy = JUMP_FORCE;

  P.vy = Math.min(P.vy + GRAVITY, 18);
  P.x += P.vx;
  P.y += P.vy;

  if (P.x < 0)       { P.x = 0;      P.vx = 0; }
  if (P.x+P.w > W)   { P.x = W-P.w;  P.vx = 0; }

  resolvePlatforms(lv.platforms);

  // Fell out of world
  if (P.y > H + 80) loseLife();

  if (P.inv > 0) P.inv--;

  // Item collisions
  for (const it of lv.items) {
    if (it.collected) continue;
    if (!overlap(P.x,P.y,P.w,P.h, it.x,it.y,20,20)) continue;
    if (it.good) {
      it.collected = true;
      collected++;
      score += 100;
    } else {
      loseLife();
    }
  }

  // Exit
  const ex = lv.exit;
  if (collected >= needed && overlap(P.x,P.y,P.w,P.h, ex.x,ex.y,ex.w,ex.h)) {
    score += 500 + lives * 200;
    state = 'levelComplete';
  }
}

function loseLife() {
  if (P.inv > 0) return;
  lives--;
  P.inv = 100;
  if (lives <= 0) state = 'gameOver';
  else resetPlayer(LEVELS[lvIdx].start.x, LEVELS[lvIdx].start.y);
}

// ─── Draw helpers ─────────────────────────────────────────────────────────────
function roundRect(x,y,w,h,r) {
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(x,y,w,h,r);
  else ctx.rect(x,y,w,h);
}

function drawItem(it) {
  if (it.collected) return;
  const bob = Math.sin(frame*0.05 + it.x*0.1) * 3;
  const cx = it.x + 10, cy = it.y + 10 - bob;
  ctx.save();
  switch (it.type) {
    case 'temp_log': {
      ctx.fillStyle = '#2ecc71';
      ctx.fillRect(cx-4, cy-12, 8, 18);
      ctx.beginPath(); ctx.arc(cx, cy+8, 6, 0, Math.PI*2);
      ctx.fillStyle = '#27ae60'; ctx.fill();
      ctx.fillStyle = '#ff4757';
      ctx.fillRect(cx-2, cy-4, 4, 12);
      // glow ring
      ctx.strokeStyle = 'rgba(46,204,113,0.4)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(cx, cy, 14, 0, Math.PI*2); ctx.stroke();
      break;
    }
    case 'label': {
      ctx.fillStyle = '#3498db';
      ctx.fillRect(cx-10, cy-11, 20, 20);
      ctx.fillStyle = '#fff';
      ctx.fillRect(cx-7, cy-8, 14, 8);
      ctx.fillStyle = '#2980b9';
      ctx.font = '5px sans-serif'; ctx.textAlign='center';
      ctx.fillText('GDP✓', cx, cy-2);
      ctx.strokeStyle='#2ecc71'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(cx-3,cy+5); ctx.lineTo(cx,cy+9); ctx.lineTo(cx+5,cy+3); ctx.stroke();
      break;
    }
    case 'delivery': {
      ctx.fillStyle = '#f5f0e8';
      ctx.fillRect(cx-10, cy-13, 20, 26);
      ctx.fillStyle = '#bdc3c7';
      for (let i=0;i<4;i++) ctx.fillRect(cx-7, cy-9+i*5, 14, 2);
      ctx.strokeStyle='#2ecc71'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(cx-7,cy+9);
      ctx.bezierCurveTo(cx-3,cy+6, cx+1,cy+11, cx+7,cy+8); ctx.stroke();
      break;
    }
    case 'cold_pack': {
      ctx.fillStyle = '#74b9ff';
      roundRect(cx-11, cy-12, 22, 24, 4); ctx.fill();
      ctx.fillStyle='#fff'; ctx.font='16px sans-serif'; ctx.textAlign='center';
      ctx.fillText('❄', cx, cy+6);
      break;
    }
    case 'expired': {
      ctx.fillStyle = '#c0392b';
      ctx.fillRect(cx-11, cy-11, 22, 22);
      ctx.strokeStyle='#ff6b6b'; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.moveTo(cx-6,cy-7); ctx.lineTo(cx+6,cy+7);
      ctx.moveTo(cx+6,cy-7); ctx.lineTo(cx-6,cy+7); ctx.stroke();
      const p = (Math.sin(frame*0.1)+1)/2;
      ctx.globalAlpha = 0.25*p; ctx.fillStyle='#ff0000';
      ctx.fillRect(cx-15,cy-15,30,30); ctx.globalAlpha=1;
      break;
    }
    case 'wrong_temp': {
      ctx.fillStyle='#f39c12';
      ctx.beginPath();
      ctx.moveTo(cx,cy+10);
      ctx.bezierCurveTo(cx-10,cy+4, cx-8,cy-4, cx-3,cy-10);
      ctx.bezierCurveTo(cx-5,cy-3, cx-1,cy, cx,cy-5);
      ctx.bezierCurveTo(cx+1,cy, cx+5,cy-3, cx+3,cy-10);
      ctx.bezierCurveTo(cx+8,cy-4, cx+10,cy+4, cx,cy+10);
      ctx.fill();
      ctx.fillStyle='#e74c3c';
      ctx.beginPath();
      ctx.moveTo(cx,cy+8); ctx.bezierCurveTo(cx-5,cy+4, cx-4,cy-2, cx,cy-6);
      ctx.bezierCurveTo(cx+4,cy-2, cx+5,cy+4, cx,cy+8); ctx.fill();
      break;
    }
    case 'damaged': {
      ctx.fillStyle='#8B6914';
      ctx.fillRect(cx-11, cy-11, 22, 22);
      ctx.strokeStyle='#ffcc00'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(cx-4,cy-11); ctx.lineTo(cx,cy-3);
      ctx.lineTo(cx-2,cy+3); ctx.lineTo(cx+3,cy+9); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx+5,cy-11); ctx.lineTo(cx+2,cy-5); ctx.stroke();
      break;
    }
    case 'temp_exc': {
      ctx.fillStyle='#e74c3c';
      ctx.fillRect(cx-4, cy-13, 8, 18);
      ctx.beginPath(); ctx.arc(cx, cy+7, 6, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle='#ff0000'; ctx.fillRect(cx-2, cy-11, 4, 18);
      ctx.fillStyle='#ffcc00'; ctx.font='bold 10px sans-serif'; ctx.textAlign='center';
      ctx.fillText('!', cx+9, cy-9);
      break;
    }
    case 'unsigned': {
      ctx.fillStyle='#7f8c8d';
      ctx.fillRect(cx-10, cy-13, 20, 26);
      ctx.fillStyle='#95a5a6';
      for (let i=0;i<4;i++) ctx.fillRect(cx-7, cy-9+i*5, 14, 2);
      ctx.strokeStyle='#e74c3c'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(cx-5,cy+5); ctx.lineTo(cx+5,cy+11);
      ctx.moveTo(cx+5,cy+5); ctx.lineTo(cx-5,cy+11); ctx.stroke();
      break;
    }
  }
  ctx.restore();
  ctx.textAlign='left';
}

function drawPlayer() {
  if (P.inv > 0 && Math.floor(frame/4)%2 === 0) return;
  const cx = P.x + P.w/2, top = P.y;
  const d  = P.right ? 1 : -1;
  ctx.save();
  ctx.translate(cx, top);
  ctx.scale(d, 1);

  // Legs
  ctx.fillStyle = '#2c3e50';
  ctx.fillRect(-8, -6, 7, 18);
  ctx.fillRect( 1, -6, 7, 18);
  // Shoes
  ctx.fillStyle = '#1a252f';
  ctx.fillRect(-9, 11, 9, 5);
  ctx.fillRect( 1, 11, 9, 5);
  // Body (uniform)
  ctx.fillStyle = '#2980b9';
  ctx.fillRect(-8,-24, 16, 18);
  // Clipboard
  ctx.fillStyle = '#ecf0f1';
  ctx.fillRect(7, -21, 11, 15);
  ctx.fillStyle = '#bdc3c7';
  for (let i=0;i<3;i++) ctx.fillRect(9,-18+i*4,7,2);
  ctx.fillStyle = '#3498db';
  ctx.fillRect(10,-23, 6, 3);
  // Head
  ctx.fillStyle = '#fad5a5';
  ctx.beginPath(); ctx.arc(0,-30, 8, 0, Math.PI*2); ctx.fill();
  // Hair
  ctx.fillStyle = '#4a3728';
  ctx.fillRect(-8,-38,16,10);
  ctx.beginPath(); ctx.arc(0,-38,8,Math.PI,0); ctx.fill();
  // Eyes
  ctx.fillStyle = '#2c3e50';
  ctx.fillRect( 2,-33,3,3);
  ctx.fillRect(-5,-33,3,3);

  ctx.restore();
}

function drawPlatforms(plats, color) {
  for (const pl of plats) {
    if (pl.w === W) {
      ctx.fillStyle = color;
      ctx.fillRect(pl.x, pl.y, pl.w, pl.h);
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      for (let x=0; x<W; x+=50) ctx.fillRect(x, pl.y, 2, pl.h);
    } else {
      ctx.fillStyle = color;
      ctx.fillRect(pl.x, pl.y, pl.w, pl.h);
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(pl.x, pl.y, pl.w, 3);
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(pl.x+6, pl.y+pl.h, 5, 14);
      ctx.fillRect(pl.x+pl.w-11, pl.y+pl.h, 5, 14);
    }
  }
}

function drawExit(ex) {
  const unlocked = collected >= needed;
  const g = (Math.sin(frame*0.06)+1)/2;
  ctx.fillStyle = unlocked ? `rgba(46,204,113,${0.6+0.4*g})` : '#636e72';
  ctx.fillRect(ex.x, ex.y, ex.w, ex.h);
  ctx.fillStyle = unlocked ? '#27ae60' : '#4a5568';
  ctx.fillRect(ex.x+3, ex.y+3, ex.w-6, ex.h-3);
  // handle
  ctx.fillStyle = '#f39c12';
  ctx.beginPath(); ctx.arc(ex.x+ex.w-10, ex.y+ex.h/2, 4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 10px sans-serif'; ctx.textAlign='center';
  if (unlocked) {
    ctx.fillText('EXIT', ex.x+ex.w/2, ex.y-7);
    ctx.fillText('▶▶', ex.x+ex.w/2, ex.y+ex.h/2+5);
  } else {
    ctx.fillText(`${collected}/${needed}`, ex.x+ex.w/2, ex.y-7);
    ctx.fillText('🔒', ex.x+ex.w/2-6, ex.y+ex.h/2+5);
  }
  ctx.textAlign='left';
}

function drawBg(lv) {
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, lv.bgColor[0]); g.addColorStop(1, lv.bgColor[1]);
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);

  if (lvIdx === 0) {
    // Warehouse shelving silhouettes
    ctx.strokeStyle = 'rgba(100,70,40,0.3)'; ctx.lineWidth=2;
    for (let x=0; x<W; x+=180) {
      ctx.beginPath(); ctx.moveTo(x+5,50); ctx.lineTo(x+5,GY); ctx.stroke();
      for (let y=80; y<GY; y+=90) {
        ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+175,y); ctx.stroke();
      }
    }
    // Cold zone hint
    ctx.fillStyle='rgba(52,152,219,0.08)';
    ctx.fillRect(0,80,210,GY-80);
    ctx.fillStyle='rgba(52,152,219,0.35)';
    ctx.font='10px sans-serif'; ctx.textAlign='center';
    ctx.fillText('COLD ZONE',105,100); ctx.textAlign='left';
  } else {
    // Distribution truck outline
    ctx.strokeStyle='rgba(80,140,80,0.25)'; ctx.lineWidth=3;
    ctx.strokeRect(570,180,210,270);
    ctx.beginPath(); ctx.moveTo(570,250); ctx.lineTo(780,250); ctx.stroke();
    ctx.beginPath(); ctx.arc(605,450,22,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(745,450,22,0,Math.PI*2); ctx.stroke();
    // Route dashes
    ctx.strokeStyle='rgba(255,255,0,0.12)'; ctx.lineWidth=2;
    ctx.setLineDash([18,10]);
    ctx.beginPath(); ctx.moveTo(30,GY+32); ctx.lineTo(W-30,GY+32); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='rgba(100,200,100,0.3)';
    ctx.font='10px sans-serif'; ctx.textAlign='center';
    ctx.fillText('LOADING BAY',675,215); ctx.textAlign='left';
  }
}

function drawHUD() {
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0,0,W,42);
  const lv = LEVELS[lvIdx];
  // Level name
  ctx.fillStyle='#f1c40f'; ctx.font='bold 13px sans-serif';
  ctx.fillText(lv.name, 10, 17);
  // Hint
  ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='10px sans-serif';
  ctx.fillText(lv.hint, 10, 33);
  // Lives
  ctx.fillStyle='#e74c3c'; ctx.font='bold 18px sans-serif';
  ctx.textAlign='right';
  ctx.fillText('♥'.repeat(Math.max(0,lives)), W-10, 20);
  ctx.textAlign='left';
  // Score
  ctx.fillStyle='#fff'; ctx.font='12px sans-serif';
  ctx.textAlign='right';
  ctx.fillText(`Score: ${score}`, W-10, 36);
  ctx.textAlign='left';
  // Progress bar
  const bx=W/2-90, bw=180, prog=Math.min(1,collected/needed);
  ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.fillRect(bx,8,bw,14);
  ctx.fillStyle = prog>=1 ? '#2ecc71' : '#3498db';
  ctx.fillRect(bx,8,bw*prog,14);
  ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1;
  ctx.strokeRect(bx,8,bw,14);
  ctx.fillStyle='#fff'; ctx.font='bold 9px sans-serif'; ctx.textAlign='center';
  ctx.fillText(`${collected}/${needed} items`, W/2, 19);
  ctx.textAlign='left';
}

// ─── Screen renderers ─────────────────────────────────────────────────────────
function drawTitle() {
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0d1b2a'); g.addColorStop(1,'#162436');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // Title
  ctx.textAlign='center';
  ctx.shadowColor='#3498db'; ctx.shadowBlur=20;
  ctx.fillStyle='#3498db'; ctx.font='bold 54px sans-serif';
  ctx.fillText('GDP GUARDIAN', W/2, 110);
  ctx.shadowBlur=0;
  ctx.fillStyle='#f1c40f'; ctx.font='italic 18px sans-serif';
  ctx.fillText('Good Distribution Practices Training', W/2, 148);

  ctx.strokeStyle='rgba(52,152,219,0.4)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(W/2-220,165); ctx.lineTo(W/2+220,165); ctx.stroke();

  ctx.fillStyle='#ecf0f1'; ctx.font='15px sans-serif';
  ctx.fillText('Play as a GDP Inspector navigating a pharmaceutical supply chain!', W/2, 195);
  ctx.fillText('Collect compliant items. Avoid GDP violations.', W/2, 218);

  ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='13px sans-serif';
  ctx.fillText(hasTouchScreen
    ? 'Use the on-screen ◀ ▶ buttons to move  ·  ▲ to jump'
    : 'Arrow Keys / WASD to move  ·  Up / W / Space to jump', W/2, 255);

  // animated inspector
  const bob = Math.sin(frame*0.05)*6;
  ctx.save(); ctx.translate(W/2, 330+bob);
  ctx.fillStyle='#2980b9'; ctx.fillRect(-10,-22,20,20);
  ctx.fillStyle='#fad5a5'; ctx.beginPath(); ctx.arc(0,-28,9,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#4a3728'; ctx.fillRect(-9,-36,18,9); ctx.beginPath(); ctx.arc(0,-36,9,Math.PI,0); ctx.fill();
  ctx.fillStyle='#ecf0f1'; ctx.fillRect(10,-18,12,16);
  ctx.fillStyle='#3498db'; ctx.fillRect(13,-20,6,3);
  ctx.restore();

  // Start button
  const pulse = (Math.sin(frame*0.08)+1)/2;
  ctx.fillStyle = `rgba(39,174,96,${0.7+0.3*pulse})`;
  roundRect(W/2-110, 380, 220, 52, 8); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 20px sans-serif';
  ctx.fillText('▶  START TRAINING', W/2, 413);
  ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.font='12px sans-serif';
  ctx.fillText(hasTouchScreen ? 'Tap anywhere to begin' : 'Click or press any key to begin', W/2, 465);
  ctx.textAlign='left';
}

function drawLevelComplete() {
  ctx.fillStyle='rgba(0,0,0,0.88)'; ctx.fillRect(0,0,W,H);
  const lv = LEVELS[lvIdx];
  const tip = lv.tip;
  ctx.textAlign='center';

  ctx.fillStyle='#2ecc71'; ctx.font='bold 38px sans-serif';
  ctx.fillText('✔  Level Complete!', W/2, 72);
  ctx.fillStyle='#f1c40f'; ctx.font='bold 16px sans-serif';
  ctx.fillText('GDP Training Checkpoint', W/2, 105);

  // Tip card
  const cx=50, cy=125, cw=W-100, ch=210;
  ctx.fillStyle='rgba(52,152,219,0.15)';
  roundRect(cx,cy,cw,ch,10); ctx.fill();
  ctx.strokeStyle='#3498db'; ctx.lineWidth=2;
  roundRect(cx,cy,cw,ch,10); ctx.stroke();

  ctx.fillStyle='#3498db'; ctx.font='bold 15px sans-serif';
  ctx.fillText(tip.title, W/2, cy+30);

  ctx.font='13px sans-serif'; ctx.textAlign='left';
  tip.lines.forEach((l,i)=>{
    ctx.fillStyle='#2ecc71'; ctx.fillText('✓', cx+18, cy+62+i*42);
    ctx.fillStyle='#ecf0f1'; ctx.fillText(l, cx+35, cy+62+i*42);
  });

  ctx.textAlign='center';
  ctx.fillStyle='#f1c40f'; ctx.font='bold 15px sans-serif';
  ctx.fillText(`Score: ${score}   Lives remaining: ${'♥'.repeat(lives)}`, W/2, 370);

  const isLast = lvIdx >= LEVELS.length-1;
  const pulse = (Math.sin(frame*0.08)+1)/2;
  ctx.fillStyle=`rgba(39,174,96,${0.7+0.3*pulse})`;
  roundRect(W/2-120, 395, 240, 52, 8); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 18px sans-serif';
  ctx.fillText(isLast ? '🏆  FINISH TRAINING' : 'NEXT LEVEL  ▶', W/2, 428);
  ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.font='11px sans-serif';
  ctx.fillText(hasTouchScreen ? 'Tap to continue' : 'Click or press any key', W/2, 475);
  ctx.textAlign='left';
}

function drawGameOver() {
  ctx.fillStyle='rgba(0,0,0,0.88)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#e74c3c'; ctx.font='bold 50px sans-serif';
  ctx.fillText('AUDIT FAILED', W/2, 185);
  ctx.fillStyle='#ecf0f1'; ctx.font='17px sans-serif';
  ctx.fillText('The GDP inspector collapsed on the job.', W/2, 233);
  ctx.fillText('Remember: GDP failures can put patients at risk!', W/2, 260);
  ctx.fillStyle='#f1c40f'; ctx.font='bold 16px sans-serif';
  ctx.fillText(`Final Score: ${score}`, W/2, 305);
  const pulse=(Math.sin(frame*0.08)+1)/2;
  ctx.fillStyle=`rgba(231,76,60,${0.7+0.3*pulse})`;
  roundRect(W/2-105,340,210,52,8); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 18px sans-serif';
  ctx.fillText('TRY AGAIN', W/2, 373);
  ctx.textAlign='left';
}

function drawWin() {
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0a1628'); g.addColorStop(1,'#1a3a1a');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // confetti
  for (let i=0;i<28;i++) {
    const px=(i*137+frame*2.5)%W, py=(i*91+frame*1.8)%H;
    ctx.fillStyle=['#f1c40f','#2ecc71','#3498db','#e74c3c','#9b59b6'][i%5];
    ctx.fillRect(px,py,7,7);
  }

  ctx.textAlign='center';
  ctx.shadowColor='#f1c40f'; ctx.shadowBlur=20;
  ctx.fillStyle='#f1c40f'; ctx.font='bold 42px sans-serif';
  ctx.fillText('TRAINING COMPLETE!', W/2, 115);
  ctx.shadowBlur=0;
  ctx.fillStyle='#2ecc71'; ctx.font='bold 20px sans-serif';
  ctx.fillText('You are now a certified GDP Guardian!', W/2, 155);

  // certificate
  const cx=80,cy=180,cw=W-160,ch=185;
  ctx.fillStyle='rgba(255,255,255,0.04)';
  roundRect(cx,cy,cw,ch,10); ctx.fill();
  ctx.strokeStyle='#f1c40f'; ctx.lineWidth=3;
  roundRect(cx,cy,cw,ch,10); ctx.stroke();
  ctx.fillStyle='#f1c40f'; ctx.font='bold 15px sans-serif';
  ctx.fillText('CERTIFICATE OF COMPLETION', W/2, cy+35);
  ctx.fillStyle='#ecf0f1'; ctx.font='14px sans-serif';
  ctx.fillText('This certifies successful completion of', W/2, cy+65);
  ctx.font='bold 16px sans-serif';
  ctx.fillText('Good Distribution Practices (GDP) Awareness Training', W/2, cy+90);
  ctx.font='13px sans-serif'; ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.fillText('Key principles covered: Temperature Control · FEFO · Cold Chain · Documentation', W/2, cy+122);
  ctx.fillStyle='#2ecc71'; ctx.font='bold 22px sans-serif';
  ctx.fillText(`Final Score: ${score}`, W/2, cy+160);

  const pulse=(Math.sin(frame*0.08)+1)/2;
  ctx.fillStyle=`rgba(39,174,96,${0.7+0.3*pulse})`;
  roundRect(W/2-110,395,220,52,8); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 18px sans-serif';
  ctx.fillText('▶  PLAY AGAIN', W/2, 428);
  ctx.textAlign='left';
}

// ─── Touch controls (on-screen buttons) ───────────────────────────────────────
// Button centres in canvas-pixel space. Hit radius is intentionally larger than draw radius.
const TBTN = {
  left:  { x: 55,    y: H - 62 },
  right: { x: 155,   y: H - 62 },
  jump:  { x: W - 70, y: H - 62 },
};
const DRAW_R = 34;   // visual circle radius (canvas px)
const HIT_R  = 52;   // tap detection radius  (canvas px) — big for fat fingers

function drawTouchButtons() {
  if (!hasTouchScreen) return;
  ctx.save();
  ctx.globalAlpha = 0.85;
  for (const [id, b] of Object.entries(TBTN)) {
    const active = touch[id];
    // shadow glow when pressed
    ctx.shadowColor = active ? '#3498db' : 'transparent';
    ctx.shadowBlur  = active ? 18 : 0;
    ctx.fillStyle   = active ? 'rgba(52,152,219,0.75)' : 'rgba(255,255,255,0.22)';
    ctx.strokeStyle = active ? '#74b9ff' : 'rgba(255,255,255,0.45)';
    ctx.lineWidth   = 2;
    ctx.beginPath(); ctx.arc(b.x, b.y, DRAW_R, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
  }
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#fff'; ctx.font = 'bold 22px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('◀', TBTN.left.x,  TBTN.left.y  + 8);
  ctx.fillText('▶', TBTN.right.x, TBTN.right.y + 8);
  ctx.fillText('▲', TBTN.jump.x,  TBTN.jump.y  + 8);
  ctx.textAlign = 'left';
  ctx.restore();
}

function canvasCoords(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  return {
    x: (clientX - r.left) * (W / r.width),
    y: (clientY - r.top)  * (H / r.height),
  };
}

function applyTouches(touchList) {
  touch.left = touch.right = touch.jump = false;
  for (const t of touchList) {
    const {x, y} = canvasCoords(t.clientX, t.clientY);
    if (Math.hypot(x - TBTN.left.x,  y - TBTN.left.y)  < HIT_R) touch.left  = true;
    if (Math.hypot(x - TBTN.right.x, y - TBTN.right.y) < HIT_R) touch.right = true;
    if (Math.hypot(x - TBTN.jump.x,  y - TBTN.jump.y)  < HIT_R) touch.jump  = true;
  }
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state !== 'playing') { handleAction(); return; }
  applyTouches(e.touches);
}, {passive: false});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  applyTouches(e.touches);
}, {passive: false});

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (state !== 'playing') return;
  applyTouches(e.touches);   // re-evaluate with remaining touches
}, {passive: false});

canvas.addEventListener('touchcancel', e => {
  touch.left = touch.right = touch.jump = false;
}, {passive: false});

// ─── Action handler (click / key for non-playing states) ─────────────────────
function handleAction() {
  if (state === 'title')         { startGame(); }
  else if (state === 'levelComplete') {
    if (lvIdx < LEVELS.length-1) loadLevel(lvIdx+1);
    else state = 'win';
  }
  else if (state === 'gameOver') { startGame(); }
  else if (state === 'win')      { startGame(); }
}

canvas.addEventListener('click', handleAction);
document.addEventListener('keydown', e => {
  if (state !== 'playing') handleAction();
});

// ─── Main loop ────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0,0,W,H);
  if (state === 'title')         { drawTitle(); return; }
  if (state === 'levelComplete') { drawLevelComplete(); return; }
  if (state === 'gameOver')      { drawGameOver(); return; }
  if (state === 'win')           { drawWin(); return; }

  const lv = LEVELS[lvIdx];
  drawBg(lv);
  drawPlatforms(lv.platforms, lv.fgColor);
  lv.items.forEach(drawItem);
  drawExit(lv.exit);
  drawPlayer();
  drawHUD();
  drawTouchButtons();   // no-ops when hasTouchScreen is false
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
