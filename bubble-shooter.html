<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bubble Shooter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f23;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
    }
    canvas { border: 2px solid #2a2a4a; border-radius: 6px; cursor: crosshair; }
    p { color: rgba(255,255,255,.3); font-size: 12px; margin-top: 8px; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<p>Move mouse to aim &bull; Click or Space to shoot</p>
<script src="config.js"></script>
<script>
// ── Unpack config ─────────────────────────────────────────────────────────────
const {
  R, COLS, MAX_ROWS, FILL_ROWS,
  BUBBLE_SPEED, MATCH_COUNT, SHOTS_PER_NEW_ROW, POINTS_PER_BUBBLE,
  AIM_GUIDE_LENGTH, AIM_GUIDE_POST_BOUNCE,
  COLORS,
} = CONFIG;

const ROW_H = R * Math.sqrt(3);   // vertical distance between row centres

// ── Canvas ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = 400, H = 600;
canvas.width  = W;
canvas.height = H;

// ── Grid helpers ──────────────────────────────────────────────────────────────

function colCount(r) { return r % 2 === 0 ? COLS : COLS - 1; }

function cellXY(r, c) {
  return {
    x: c * R * 2 + (r % 2 ? R : 0) + R,
    y: r * ROW_H + R,
  };
}

function neighbors(r, c) {
  const e = r % 2 === 0;
  return [
    [r,   c - 1],
    [r,   c + 1],
    [r-1, e ? c-1 : c  ],
    [r-1, e ? c   : c+1],
    [r+1, e ? c-1 : c  ],
    [r+1, e ? c   : c+1],
  ].filter(([nr, nc]) =>
    nr >= 0 && nr < MAX_ROWS && nc >= 0 && nc < colCount(nr)
  );
}

// ── State ─────────────────────────────────────────────────────────────────────

let grid, score, shotsFired, pendingNewRow, availableColors, gameOver, winner, flying, shooter;

// Always draw from the shrinking pool of colors still in play.
function rndColor() {
  return availableColors[Math.random() * availableColors.length | 0];
}

// After any grid change, drop colors that no longer exist anywhere.
// A color survives if it is still in the grid, the cannon, or the next slot.
function pruneColors() {
  const inPlay = new Set();
  for (let r = 0; r < MAX_ROWS; r++)
    for (let c = 0; c < colCount(r); c++)
      if (grid[r][c]) inPlay.add(grid[r][c]);
  inPlay.add(shooter.color);
  inPlay.add(shooter.next);
  if (flying) inPlay.add(flying.color);
  availableColors = availableColors.filter(col => inPlay.has(col));
}

function init() {
  availableColors = [...COLORS];   // full palette; shrinks as colours are cleared
  grid            = Array.from({ length: MAX_ROWS }, (_, r) => new Array(colCount(r)).fill(null));
  score           = 0;
  shotsFired      = 0;
  pendingNewRow   = false;
  gameOver        = false;
  winner          = false;
  flying          = null;
  shooter         = { x: W / 2, y: H - 50, angle: -Math.PI / 2, color: rndColor(), next: rndColor() };

  for (let r = 0; r < FILL_ROWS; r++)
    for (let c = 0; c < colCount(r); c++)
      grid[r][c] = rndColor();
}

// ── Match & drop ──────────────────────────────────────────────────────────────

function flood(r, c, col, seen) {
  const k = `${r},${c}`;
  if (seen.has(k) || grid[r]?.[c] !== col) return [];
  seen.add(k);
  return [[r, c], ...neighbors(r, c).flatMap(([nr, nc]) => flood(nr, nc, col, seen))];
}

function connectedToTop() {
  const seen = new Set();
  const q = [];
  for (let c = 0; c < colCount(0); c++)
    if (grid[0][c]) { seen.add(`0,${c}`); q.push([0, c]); }
  while (q.length) {
    const [r, c] = q.shift();
    for (const [nr, nc] of neighbors(r, c)) {
      const k = `${nr},${nc}`;
      if (!seen.has(k) && grid[nr][nc]) { seen.add(k); q.push([nr, nc]); }
    }
  }
  return seen;
}

function checkGameOver() {
  const limitY = H - 95;
  for (let r = 0; r < MAX_ROWS; r++)
    for (let c = 0; c < colCount(r); c++)
      if (grid[r][c] && cellXY(r, c).y > limitY) return true;
  return false;
}

function checkWinner() {
  for (let r = 0; r < MAX_ROWS; r++)
    for (let c = 0; c < colCount(r); c++)
      if (grid[r][c]) return false;
  return true;
}

function attach(px, py, col) {
  // Snap to nearest empty cell
  let best, bestD = Infinity;
  for (let r = 0; r < MAX_ROWS; r++)
    for (let c = 0; c < colCount(r); c++) {
      if (grid[r][c]) continue;
      const { x, y } = cellXY(r, c);
      const d = Math.hypot(px - x, py - y);
      if (d < bestD) { bestD = d; best = [r, c]; }
    }
  if (!best) return 0;

  const [r, c] = best;
  grid[r][c] = col;

  // Pop group of MATCH_COUNT+
  let pts = 0;
  const group = flood(r, c, col, new Set());
  if (group.length >= MATCH_COUNT) {
    for (const [gr, gc] of group) grid[gr][gc] = null;
    pts += group.length;
    // Drop bubbles no longer connected to ceiling
    const conn = connectedToTop();
    for (let rr = 0; rr < MAX_ROWS; rr++)
      for (let cc = 0; cc < colCount(rr); cc++)
        if (grid[rr][cc] && !conn.has(`${rr},${cc}`)) { grid[rr][cc] = null; pts++; }
  }

  // Prune eliminated colours after pops/drops, then add a new row if this
  // shot was the one that triggered the threshold (timing fix: we do it here,
  // AFTER the bubble has already landed and resolved, not at fire-time).
  pruneColors();
  if (pendingNewRow) {
    pendingNewRow = false;
    addNewRow();   // addNewRow uses rndColor() → respects pruned palette
    pruneColors(); // new row may contain only surviving colours; re-check
  }

  if (!gameOver && checkGameOver()) gameOver = true;
  if (!gameOver && !winner && checkWinner()) winner = true;

  return pts;
}

// ── New row from top ──────────────────────────────────────────────────────────

function addNewRow() {
  // Shift every row down by one, adapting even/odd column counts
  for (let r = MAX_ROWS - 1; r >= 1; r--) {
    const newCols = colCount(r);
    const oldCols = colCount(r - 1);
    const row = new Array(newCols).fill(null);
    for (let c = 0; c < Math.min(newCols, oldCols); c++)
      row[c] = grid[r - 1][c];
    grid[r] = row;
  }
  // Fresh row at the top
  grid[0] = Array.from({ length: colCount(0) }, () => rndColor());
  if (checkGameOver()) gameOver = true;
}

// ── Audio ─────────────────────────────────────────────────────────────────────

let audioCtx = null;

function playShootSound() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sine';
    const t = audioCtx.currentTime;
    osc.frequency.setValueAtTime(520, t);
    osc.frequency.exponentialRampToValueAtTime(130, t + 0.12);
    gain.gain.setValueAtTime(0.22, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    osc.start(t);
    osc.stop(t + 0.12);
  } catch (_) { /* audio unavailable */ }
}

// ── Shoot ─────────────────────────────────────────────────────────────────────

function shoot() {
  if (flying || gameOver || winner) return;
  flying = {
    x: shooter.x, y: shooter.y,
    vx: Math.cos(shooter.angle) * BUBBLE_SPEED,
    vy: Math.sin(shooter.angle) * BUBBLE_SPEED,
    color: shooter.color,
  };
  shooter.color = shooter.next;
  shooter.next  = rndColor();
  playShootSound();

  shotsFired++;
  if (shotsFired % SHOTS_PER_NEW_ROW === 0) pendingNewRow = true;
}

// ── Update ────────────────────────────────────────────────────────────────────

function update() {
  if (!flying) return;
  flying.x += flying.vx;
  flying.y += flying.vy;

  // Bounce off side walls
  if (flying.x - R < 0) { flying.x = R;     flying.vx =  Math.abs(flying.vx); }
  if (flying.x + R > W) { flying.x = W - R; flying.vx = -Math.abs(flying.vx); }

  // Hit ceiling
  if (flying.y - R <= 0) {
    score += attach(flying.x, R, flying.color) * POINTS_PER_BUBBLE;
    flying = null;
    return;
  }

  // Collide with a grid bubble
  for (let r = 0; r < MAX_ROWS; r++)
    for (let c = 0; c < colCount(r); c++) {
      if (!grid[r][c]) continue;
      const { x, y } = cellXY(r, c);
      if (Math.hypot(flying.x - x, flying.y - y) < R * 2 - 1) {
        score += attach(flying.x, flying.y, flying.color) * POINTS_PER_BUBBLE;
        flying = null;
        return;
      }
    }
}

// ── Render ────────────────────────────────────────────────────────────────────

function drawBubble(x, y, col, r = R) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = col;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,.18)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  // Glossy sheen
  const g = ctx.createRadialGradient(x - r * .32, y - r * .35, r * .05, x, y, r);
  g.addColorStop(0,   'rgba(255,255,255,.48)');
  g.addColorStop(.5,  'rgba(255,255,255,0)');
  g.addColorStop(1,   'rgba(0,0,0,.20)');
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = g;
  ctx.fill();
}

function drawAimGuide() {
  // Pre-compute distance to first wall hit so we can guarantee
  // AIM_GUIDE_POST_BOUNCE pixels are drawn past that bounce point.
  const initVx  = Math.cos(shooter.angle);
  const tToWall = initVx < 0 ? (R - shooter.x) / initVx
                : initVx > 0 ? (W - R - shooter.x) / initVx
                : Infinity;
  const total = isFinite(tToWall)
    ? Math.max(AIM_GUIDE_LENGTH, tToWall + AIM_GUIDE_POST_BOUNCE)
    : AIM_GUIDE_LENGTH;

  let x = shooter.x, y = shooter.y;
  let vx = initVx, vy = Math.sin(shooter.angle);
  let rem = total;

  ctx.save();
  ctx.setLineDash([6, 10]);
  ctx.strokeStyle = 'rgba(255,255,255,.28)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(x, y);

  while (rem > 0) {
    const tL     = vx < 0 ? (R - x) / vx : Infinity;
    const tR     = vx > 0 ? (W - R - x) / vx : Infinity;
    const tWall  = Math.min(tL, tR);
    const hitWall = tWall < rem;
    const t = hitWall ? tWall : rem;
    x += vx * t;
    y += vy * t;
    ctx.lineTo(x, y);
    rem -= t;
    if (hitWall) vx = -vx;
  }

  ctx.stroke();
  ctx.restore();
}

function drawOverlay(heading, headingColor, sub, hint) {
  ctx.fillStyle = 'rgba(0,0,0,.72)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.font = 'bold 42px sans-serif';
  ctx.fillStyle = headingColor;
  ctx.fillText(heading, W / 2, H / 2 - 28);
  ctx.font = '20px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.fillText(sub, W / 2, H / 2 + 16);
  ctx.font = '13px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,.52)';
  ctx.fillText(hint, W / 2, H / 2 + 52);
  ctx.textAlign = 'left';
}

function draw() {
  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, 0, W, H);

  // Grid bubbles
  for (let r = 0; r < MAX_ROWS; r++)
    for (let c = 0; c < colCount(r); c++)
      if (grid[r][c]) { const { x, y } = cellXY(r, c); drawBubble(x, y, grid[r][c]); }

  // Flying bubble
  if (flying) drawBubble(flying.x, flying.y, flying.color);

  // Aim guide (only when active)
  if (!gameOver && !winner) drawAimGuide();

  // Shooter panel divider
  ctx.strokeStyle = 'rgba(255,255,255,.07)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, H - 90); ctx.lineTo(W, H - 90); ctx.stroke();

  // Current bubble in shooter
  drawBubble(shooter.x, shooter.y, shooter.color);

  // Next bubble
  ctx.fillStyle = 'rgba(255,255,255,.42)';
  ctx.font = '11px sans-serif';
  ctx.fillText('NEXT', 20, H - 63);
  drawBubble(42, H - 40, shooter.next, R * .65);

  // Score
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText(`Score: ${score}`, W - 12, H - 36);
  ctx.textAlign = 'left';

  // Shots-until-next-row counter
  const shotsLeft = SHOTS_PER_NEW_ROW - (shotsFired % SHOTS_PER_NEW_ROW);
  ctx.fillStyle = 'rgba(255,255,255,.35)';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(`New row in ${shotsLeft} shot${shotsLeft === 1 ? '' : 's'}`, W / 2, H - 8);
  ctx.textAlign = 'left';

  // Overlays
  if (winner)   drawOverlay('You Win!',  '#f1c40f', `Score: ${score}`, 'Click or Space to play again');
  if (gameOver) drawOverlay('Game Over', '#e74c3c', `Score: ${score}`, 'Click or Space to restart');
}

// ── Input ─────────────────────────────────────────────────────────────────────

function setAngle(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const dx = clientX - rect.left - shooter.x;
  const dy = clientY - rect.top  - shooter.y;
  shooter.angle = Math.max(-Math.PI + .15, Math.min(-.15, Math.atan2(dy, dx)));
}

canvas.addEventListener('mousemove', e => setAngle(e.clientX, e.clientY));

canvas.addEventListener('click', () => {
  if (gameOver || winner) { init(); return; }
  shoot();
});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  setAngle(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (gameOver || winner) { init(); return; }
  shoot();
}, { passive: false });

document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (gameOver || winner) init(); else shoot();
  }
});

// ── Run ───────────────────────────────────────────────────────────────────────

init();
(function loop() { update(); draw(); requestAnimationFrame(loop); })();
</script>
</body>
</html>
